name: Test Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: relancepro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/relancepro_test
      NEXTAUTH_SECRET: test-secret-key-for-coverage
      NEXTAUTH_URL: http://localhost:3000
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            node_modules
            .npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Setup test database
        run: |
          npx prisma migrate deploy
          npx prisma db seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/relancepro_test

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text --coverageReporters=json-summary --maxWorkers=2
        
      - name: Generate coverage summary
        id: coverage
        run: |
          # Extract coverage percentages
          coverage=$(cat coverage/coverage-summary.json)
          
          lines=$(echo $coverage | jq '.total.lines.pct')
          statements=$(echo $coverage | jq '.total.statements.pct')
          branches=$(echo $coverage | jq '.total.branches.pct')
          functions=$(echo $coverage | jq '.total.functions.pct')
          
          echo "lines=$lines" >> $GITHUB_OUTPUT
          echo "statements=$statements" >> $GITHUB_OUTPUT
          echo "branches=$branches" >> $GITHUB_OUTPUT
          echo "functions=$functions" >> $GITHUB_OUTPUT
          
          echo "### 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $lines% |" >> $GITHUB_STEP_SUMMARY
          echo "| Statements | $statements% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | $branches% |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | $functions% |" >> $GITHUB_STEP_SUMMARY

      - name: Check coverage thresholds
        run: |
          # Fail if coverage is below threshold
          threshold=70
          
          if (( $(echo "${{ steps.coverage.outputs.lines }} < $threshold" | bc -l) )); then
            echo "::error::Line coverage (${{ steps.coverage.outputs.lines }}%) is below threshold ($threshold%)"
            exit 1
          fi
          
          echo "✅ Coverage meets minimum threshold of $threshold%"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-relancepro
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read coverage summary
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = summary.total;
            
            // Create coverage badge color
            const getColor = (pct) => {
              if (pct >= 90) return 'brightgreen';
              if (pct >= 80) return 'green';
              if (pct >= 70) return 'yellow';
              if (pct >= 60) return 'orange';
              return 'red';
            };
            
            const linesColor = getColor(total.lines.pct);
            
            // Create comment body
            const body = `## 📊 Test Coverage Report
            
            ![Coverage](https://img.shields.io/badge/coverage-${total.lines.pct}%25-${linesColor})
            
            | Metric | Coverage | Covered | Total |
            |--------|----------|---------|-------|
            | **Lines** | ${total.lines.pct}% | ${total.lines.covered} | ${total.lines.total} |
            | **Statements** | ${total.statements.pct}% | ${total.statements.covered} | ${total.statements.total} |
            | **Branches** | ${total.branches.pct}% | ${total.branches.covered} | ${total.branches.total} |
            | **Functions** | ${total.functions.pct}% | ${total.functions.covered} | ${total.functions.total} |
            
            <details>
            <summary>📁 View detailed coverage by file</summary>
            
            \`\`\`
            ${JSON.stringify(summary, null, 2)}
            \`\`\`
            </details>
            
            _Coverage generated from commit: ${context.sha.substring(0, 7)}_
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📊 Test Coverage Report')
            );
            
            // Update or create comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  coverage-diff:
    name: Coverage Diff
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get base branch coverage
        id: base_coverage
        run: |
          git checkout ${{ github.base_ref }}
          npm ci --prefer-offline || true
          npm test -- --coverage --coverageReporters=json-summary --silent --passWithNoTests || true
          
          if [ -f coverage/coverage-summary.json ]; then
            base_lines=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "lines=$base_lines" >> $GITHUB_OUTPUT
          else
            echo "lines=0" >> $GITHUB_OUTPUT
          fi

      - name: Calculate coverage diff
        run: |
          # Download PR coverage
          echo "### 📈 Coverage Change" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Base branch coverage: ${{ steps.base_coverage.outputs.lines }}%" >> $GITHUB_STEP_SUMMARY
